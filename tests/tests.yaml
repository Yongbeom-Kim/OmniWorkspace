tests:
  - name: "Can add empty repo to workspace"
    prepare:
    |-
      ows repo add git@github.com:Yongbeom-Kim/OmniWorkspace-test-empty-repo.git
    test:
    |-
      ows workspace add test-workspace-with-empty-repo OmniWorkspace-test-empty-repo
    verify:
    |-
      true

  - name: "Can add public repo via HTTPS and create workspace"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
    test:
    |-
      ows workspace add hello-workspace Hello-World
    verify:
    |-
      ows workspaces | grep -q hello-workspace
      ows repos | grep -q Hello-World

  - name: "Workspace defaults are applied on read"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows workspace add defaults-test Hello-World
    test:
    |-
      # Manually strip the branch field from config to simulate a sparse config
      yq -i 'del(.workspaces.defaults-test.branch)' ~/.ows/config.yaml
    verify:
    |-
      # After stripping branch, reading the workspace should fill in the default (workspace name)
      branch=$(yq -r '.workspaces."defaults-test".branch' ~/.ows/config.yaml)
      if [ "$branch" != "null" ] && [ -n "$branch" ]; then
        echo "FAIL: branch should be missing from YAML (sparse storage), got: $branch" >&2
        exit 1
      fi
      # But the ows tool should report the workspace with default branch applied
      # Verify workspace still works by adding another repo
      ows repo add https://github.com/octocat/Spoon-Knife.git
      ows workspace add defaults-test Spoon-Knife

  - name: "Repo defaults fill in missing directory"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
    test:
    |-
      # Manually strip the dir field from repo config
      yq -i 'del(.repos.Hello-World.dir)' ~/.ows/config.yaml
    verify:
    |-
      # The repo should still be usable (dir default fills in on read)
      # Verify by adding it to a workspace (which reads the repo config)
      ows workspace add dir-default-test Hello-World

  - name: "Global editor not stored explicitly (sparse storage)"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
    test:
    |-
      true
    verify:
    |-
      # After initializing config, editor should NOT be stored (sparse storage)
      editor=$(yq -r '.global.editor' ~/.ows/config.yaml)
      if [ "$editor" != "null" ] && [ -n "$editor" ]; then
        echo "FAIL: editor should not be stored in config (sparse storage), got: $editor" >&2
        exit 1
      fi

  - name: "Null config values replaced by defaults"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows workspace add null-test Hello-World
    test:
    |-
      # Set branch to explicit null in YAML
      yq -i '.workspaces.null-test.branch = null' ~/.ows/config.yaml
    verify:
    |-
      # Workspace should still be usable - null branch gets replaced by default
      # Adding another repo exercises config__workspace__get which merges defaults
      ows repo add https://github.com/octocat/Spoon-Knife.git
      ows workspace add null-test Spoon-Knife

  - name: "Explicit config values override defaults"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows workspace add explicit-test Hello-World
    test:
    |-
      # Set a custom branch name
      ows workspace checkout explicit-test custom-branch-name
    verify:
    |-
      # Verify the custom branch was preserved (not overwritten by default)
      branch=$(yq -r '.workspaces.explicit-test.branch' ~/.ows/config.yaml)
      if [ "$branch" != "custom-branch-name" ]; then
        echo "FAIL: expected branch=custom-branch-name, got: $branch" >&2
        exit 1
      fi

  - name: "Multiple repos in one workspace"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows repo add https://github.com/octocat/Spoon-Knife.git
    test:
    |-
      ows workspace add multi-repo-test Hello-World Spoon-Knife
    verify:
    |-
      # Verify both repos are in the workspace
      repo_count=$(yq '.workspaces.multi-repo-test.repos | length' ~/.ows/config.yaml)
      if [ "$repo_count" != "2" ]; then
        echo "FAIL: expected 2 repos, got: $repo_count" >&2
        exit 1
      fi

  - name: "Can add repo with custom name"
    prepare:
    |-
      true
    test:
    |-
      ows repo add https://github.com/octocat/Hello-World.git my-custom-name
    verify:
    |-
      url=$(yq -r '.repos.my-custom-name.origin_url' ~/.ows/config.yaml)
      if [ "$url" != "https://github.com/octocat/Hello-World.git" ]; then
        echo "FAIL: expected custom repo name with correct URL, got: $url" >&2
        exit 1
      fi

  - name: "Can remove a repo"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
    test:
    |-
      ows repo remove Hello-World
    verify:
    |-
      entry=$(yq -r '.repos.Hello-World' ~/.ows/config.yaml)
      if [ "$entry" != "null" ]; then
        echo "FAIL: repo should be removed from config, got: $entry" >&2
        exit 1
      fi
      if [ -d ~/.ows/repos/Hello-World ]; then
        echo "FAIL: repo directory should be removed" >&2
        exit 1
      fi

  - name: "Can list repos"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows repo add https://github.com/octocat/Spoon-Knife.git
    test:
    |-
      true
    verify:
    |-
      ows repos | grep -q Hello-World
      ows repos | grep -q Spoon-Knife

  - name: "Can pull repos"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
    test:
    |-
      ows repo pull Hello-World
    verify:
    |-
      true

  - name: "Can create empty workspace"
    prepare:
    |-
      true
    test:
    |-
      ows workspace add empty-ws
    verify:
    |-
      entry=$(yq -r '.workspaces.empty-ws' ~/.ows/config.yaml)
      if [ "$entry" = "null" ]; then
        echo "FAIL: workspace should exist in config" >&2
        exit 1
      fi
      if [ ! -d ~/.ows/workspaces/empty-ws ]; then
        echo "FAIL: workspace directory should exist" >&2
        exit 1
      fi

  - name: "Can delete a workspace"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows workspace add delete-test Hello-World
    test:
    |-
      ows workspace delete delete-test
    verify:
    |-
      entry=$(yq -r '.workspaces.delete-test' ~/.ows/config.yaml)
      if [ "$entry" != "null" ]; then
        echo "FAIL: workspace should be removed from config, got: $entry" >&2
        exit 1
      fi
      if [ -d ~/.ows/workspaces/delete-test ]; then
        echo "FAIL: workspace directory should be removed" >&2
        exit 1
      fi

  - name: "Can remove repo from workspace"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows repo add https://github.com/octocat/Spoon-Knife.git
      ows workspace add remove-repo-test Hello-World Spoon-Knife
    test:
    |-
      ows workspace remove-repo remove-repo-test Hello-World
    verify:
    |-
      repo_count=$(yq '.workspaces.remove-repo-test.repos | length' ~/.ows/config.yaml)
      if [ "$repo_count" != "1" ]; then
        echo "FAIL: expected 1 repo remaining, got: $repo_count" >&2
        exit 1
      fi
      remaining=$(yq -r '.workspaces.remove-repo-test.repos[0]' ~/.ows/config.yaml)
      if [ "$remaining" != "Spoon-Knife" ]; then
        echo "FAIL: expected Spoon-Knife to remain, got: $remaining" >&2
        exit 1
      fi
      if [ -d ~/.ows/workspaces/remove-repo-test/Hello-World ]; then
        echo "FAIL: Hello-World worktree dir should be removed" >&2
        exit 1
      fi
      if [ ! -d ~/.ows/workspaces/remove-repo-test/Spoon-Knife ]; then
        echo "FAIL: Spoon-Knife worktree dir should still exist" >&2
        exit 1
      fi

  - name: "Can checkout branch across workspace"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows workspace add branch-test Hello-World
    test:
    |-
      ows workspace checkout branch-test my-feature
    verify:
    |-
      branch=$(yq -r '.workspaces.branch-test.branch' ~/.ows/config.yaml)
      if [ "$branch" != "my-feature" ]; then
        echo "FAIL: expected branch=my-feature in config, got: $branch" >&2
        exit 1
      fi
      # Verify actual git branch in worktree
      actual_branch=$(cd ~/.ows/workspaces/branch-test/Hello-World && git rev-parse --abbrev-ref HEAD)
      if [ "$actual_branch" != "my-feature" ]; then
        echo "FAIL: expected git branch=my-feature, got: $actual_branch" >&2
        exit 1
      fi

  - name: "Checkout with -b flag works"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows workspace add flag-test Hello-World
    test:
    |-
      ows workspace checkout flag-test -b my-feature-b
    verify:
    |-
      branch=$(yq -r '.workspaces.flag-test.branch' ~/.ows/config.yaml)
      if [ "$branch" != "my-feature-b" ]; then
        echo "FAIL: expected branch=my-feature-b in config, got: $branch" >&2
        exit 1
      fi
      actual_branch=$(cd ~/.ows/workspaces/flag-test/Hello-World && git rev-parse --abbrev-ref HEAD)
      if [ "$actual_branch" != "my-feature-b" ]; then
        echo "FAIL: expected git branch=my-feature-b, got: $actual_branch" >&2
        exit 1
      fi

  - name: "Can pull workspace"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows workspace add pull-test Hello-World
    test:
    |-
      ows workspace pull pull-test
    verify:
    |-
      true

  - name: "Exec runs command in workspace directory"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows repo add https://github.com/octocat/Spoon-Knife.git
      ows workspace add exec-test Hello-World Spoon-Knife
    test:
    |-
      ows workspace exec exec-test ls
    verify:
    |-
      # Exec runs in workspace root; verify repo subdirectories are listed
      output=$(ows workspace exec exec-test ls)
      echo "$output" | grep -q Hello-World
      echo "$output" | grep -q Spoon-Knife

  - name: "Post-copy hooks run on workspace add"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      # Write a post-copy hook that creates a marker file
      # Hook is stored as a YAML array: ["script"]
      yq -i '.repos.Hello-World.post-copy-hook = ["touch .hook-ran"]' ~/.ows/config.yaml
    test:
    |-
      ows workspace add hook-test Hello-World
    verify:
    |-
      if [ ! -f ~/.ows/workspaces/hook-test/Hello-World/.hook-ran ]; then
        echo "FAIL: post-copy hook marker file not found" >&2
        exit 1
      fi

  - name: "Shortcut aliases work"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows workspace add alias-test Hello-World
    test:
    |-
      ows wss
      ows rs
      ows co alias-test some-branch
    verify:
    |-
      # Verify checkout alias actually worked
      branch=$(yq -r '.workspaces.alias-test.branch' ~/.ows/config.yaml)
      if [ "$branch" != "some-branch" ]; then
        echo "FAIL: expected branch=some-branch after alias checkout, got: $branch" >&2
        exit 1
      fi

  - name: "Invalid workspace name is rejected"
    prepare:
    |-
      true
    test:
    |-
      ! ows workspace add "invalid name with spaces"
    verify:
    |-
      true

  - name: "Unknown command is rejected"
    prepare:
    |-
      true
    test:
    |-
      ! ows foobar
    verify:
    |-
      true

  - name: "Removing non-existent repo from workspace errors"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows workspace add graceful-test Hello-World
    test:
    |-
      ! ows workspace remove-repo graceful-test nonexistent-repo
    verify:
    |-
      # Workspace should still be intact despite the error
      entry=$(yq -r '.workspaces.graceful-test' ~/.ows/config.yaml)
      if [ "$entry" = "null" ]; then
        echo "FAIL: workspace should still exist after failed remove" >&2
        exit 1
      fi

  - name: "Adding same repo twice is idempotent"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
    test:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
    verify:
    |-
      # Should still have exactly one Hello-World entry with correct URL
      url=$(yq -r '.repos.Hello-World.origin_url' ~/.ows/config.yaml)
      if [ "$url" != "https://github.com/octocat/Hello-World.git" ]; then
        echo "FAIL: expected correct URL after double add, got: $url" >&2
        exit 1
      fi

  - name: "Adding repo to workspace twice is idempotent"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows workspace add idempotent-test Hello-World
    test:
    |-
      ows workspace add idempotent-test Hello-World
    verify:
    |-
      repo_count=$(yq '.workspaces.idempotent-test.repos | length' ~/.ows/config.yaml)
      if [ "$repo_count" != "1" ]; then
        echo "FAIL: expected 1 repo after double add, got: $repo_count" >&2
        exit 1
      fi

  - name: "Two workspaces with different repos can share a branch"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows repo add https://github.com/octocat/Spoon-Knife.git
      ows workspace add share-branch-a Hello-World
      ows workspace add share-branch-b Spoon-Knife
      ows workspace checkout share-branch-a dev
    test:
    |-
      ows workspace checkout share-branch-b dev
    verify:
    |-
      branch_a=$(yq -r '.workspaces.share-branch-a.branch' ~/.ows/config.yaml)
      branch_b=$(yq -r '.workspaces.share-branch-b.branch' ~/.ows/config.yaml)
      if [ "$branch_a" != "dev" ]; then
        echo "FAIL: expected share-branch-a branch=dev, got: $branch_a" >&2
        exit 1
      fi
      if [ "$branch_b" != "dev" ]; then
        echo "FAIL: expected share-branch-b branch=dev, got: $branch_b" >&2
        exit 1
      fi
      actual_a=$(cd ~/.ows/workspaces/share-branch-a/Hello-World && git rev-parse --abbrev-ref HEAD)
      actual_b=$(cd ~/.ows/workspaces/share-branch-b/Spoon-Knife && git rev-parse --abbrev-ref HEAD)
      if [ "$actual_a" != "dev" ]; then
        echo "FAIL: expected Hello-World git branch=dev, got: $actual_a" >&2
        exit 1
      fi
      if [ "$actual_b" != "dev" ]; then
        echo "FAIL: expected Spoon-Knife git branch=dev, got: $actual_b" >&2
        exit 1
      fi

  - name: "Two workspaces sharing a repo cannot use the same branch"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows repo add https://github.com/octocat/Spoon-Knife.git
      ows workspace add conflict-a Hello-World Spoon-Knife
      ows workspace add conflict-b Hello-World
      ows workspace checkout conflict-a dev
    test:
    |-
      # Capture stderr to verify repo-specific error message
      output=$(ows workspace checkout conflict-b dev 2>&1) && exit 1 || true
      echo "$output" | grep -q "Hello-World"
    verify:
    |-
      # Config should still have the old branch (workspace name as default)
      branch=$(yq -r '.workspaces.conflict-b.branch' ~/.ows/config.yaml)
      if [ "$branch" = "dev" ]; then
        echo "FAIL: conflict-b branch should NOT be dev after failed checkout" >&2
        exit 1
      fi

  - name: "Checkout rolls back on partial failure"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows repo add https://github.com/octocat/Spoon-Knife.git
      ows workspace add rollback-test Hello-World Spoon-Knife
      # Corrupt the Spoon-Knife worktree .git file so git checkout will fail
      cp ~/.ows/workspaces/rollback-test/Spoon-Knife/.git ~/.ows/workspaces/rollback-test/Spoon-Knife/.git.bak
      echo "garbage" > ~/.ows/workspaces/rollback-test/Spoon-Knife/.git
    test:
    |-
      ! ows workspace checkout rollback-test my-rollback-branch
    verify:
    |-
      # Restore .git file for cleanup
      mv ~/.ows/workspaces/rollback-test/Spoon-Knife/.git.bak ~/.ows/workspaces/rollback-test/Spoon-Knife/.git
      # Config branch should still be the default (workspace name), not the new branch
      branch=$(yq -r '.workspaces.rollback-test.branch' ~/.ows/config.yaml)
      if [ "$branch" = "my-rollback-branch" ]; then
        echo "FAIL: config branch should not be my-rollback-branch after failed checkout" >&2
        exit 1
      fi
      # Hello-World should still be on its original branch (not my-rollback-branch)
      actual_branch=$(cd ~/.ows/workspaces/rollback-test/Hello-World && git rev-parse --abbrev-ref HEAD)
      if [ "$actual_branch" = "my-rollback-branch" ]; then
        echo "FAIL: Hello-World should have been rolled back, but is on my-rollback-branch" >&2
        exit 1
      fi

  - name: "Layer save and load roundtrip with repos"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows workspace add layer-rt Hello-World
      # Create non-repo files in workspace
      echo "hello" > ~/.ows/workspaces/layer-rt/notes.txt
      mkdir -p ~/.ows/workspaces/layer-rt/config
      echo "key=value" > ~/.ows/workspaces/layer-rt/config/settings.ini
    test:
    |-
      ows layer save layer-rt my-layer
      # Remove the original files
      rm ~/.ows/workspaces/layer-rt/notes.txt
      rm -rf ~/.ows/workspaces/layer-rt/config
      # Load them back
      ows layer load layer-rt my-layer
    verify:
    |-
      # Verify files restored with correct contents
      content=$(cat ~/.ows/workspaces/layer-rt/notes.txt)
      if [ "$content" != "hello" ]; then
        echo "FAIL: expected notes.txt content=hello, got: $content" >&2
        exit 1
      fi
      content=$(cat ~/.ows/workspaces/layer-rt/config/settings.ini)
      if [ "$content" != "key=value" ]; then
        echo "FAIL: expected settings.ini content=key=value, got: $content" >&2
        exit 1
      fi
      # Verify repo directory was not affected
      if [ ! -e ~/.ows/workspaces/layer-rt/Hello-World/.git ]; then
        echo "FAIL: repo .git should still exist" >&2
        exit 1
      fi

  - name: "Layer save on workspace with no repos"
    prepare:
    |-
      ows workspace add layer-no-repo
      echo "standalone" > ~/.ows/workspaces/layer-no-repo/file.txt
    test:
    |-
      ows layer save layer-no-repo no-repo-layer
    verify:
    |-
      # Verify layer was saved in config
      ows layer list | grep -q no-repo-layer
      # Load it back after clearing
      rm ~/.ows/workspaces/layer-no-repo/file.txt
      ows layer load layer-no-repo no-repo-layer
      content=$(cat ~/.ows/workspaces/layer-no-repo/file.txt)
      if [ "$content" != "standalone" ]; then
        echo "FAIL: expected file.txt content=standalone, got: $content" >&2
        exit 1
      fi

  - name: "Layer save on empty workspace saves empty layer"
    prepare:
    |-
      ows workspace add layer-empty
    test:
    |-
      ows layer save layer-empty empty-layer
    verify:
    |-
      ows layer list | grep -q empty-layer
      file_count=$(yq '.layer.empty-layer.files | length' ~/.ows/config.yaml)
      if [ "$file_count" != "0" ]; then
        echo "FAIL: expected 0 files in empty layer, got: $file_count" >&2
        exit 1
      fi

  - name: "Layer load clears existing non-repo files"
    prepare:
    |-
      ows repo add https://github.com/octocat/Hello-World.git
      ows workspace add layer-clear Hello-World
      echo "original" > ~/.ows/workspaces/layer-clear/old-file.txt
      ows layer save layer-clear clear-layer
      # Add a different file that should be cleared on load
      echo "extra" > ~/.ows/workspaces/layer-clear/extra-file.txt
    test:
    |-
      ows layer load layer-clear clear-layer
    verify:
    |-
      # Original file should be restored
      if [ ! -f ~/.ows/workspaces/layer-clear/old-file.txt ]; then
        echo "FAIL: old-file.txt should be restored by layer load" >&2
        exit 1
      fi
      # Extra file should have been cleared
      if [ -f ~/.ows/workspaces/layer-clear/extra-file.txt ]; then
        echo "FAIL: extra-file.txt should have been cleared by layer load" >&2
        exit 1
      fi

  - name: "Layer list shows saved layers"
    prepare:
    |-
      ows workspace add layer-list-ws
      echo "a" > ~/.ows/workspaces/layer-list-ws/a.txt
      ows layer save layer-list-ws alpha-layer
      echo "b" > ~/.ows/workspaces/layer-list-ws/b.txt
      ows layer save layer-list-ws beta-layer
    test:
    |-
      ows layer list
    verify:
    |-
      ows layer list | grep -q alpha-layer
      ows layer list | grep -q beta-layer

  - name: "Layer delete removes layer from config"
    prepare:
    |-
      ows workspace add layer-del-ws
      echo "data" > ~/.ows/workspaces/layer-del-ws/data.txt
      ows layer save layer-del-ws del-layer
    test:
    |-
      ows layer delete del-layer
    verify:
    |-
      result=$(yq -r '.layer.del-layer' ~/.ows/config.yaml)
      if [ "$result" != "null" ]; then
        echo "FAIL: layer should be removed from config, got: $result" >&2
        exit 1
      fi

  - name: "Layer delete non-existent is idempotent"
    prepare:
    |-
      true
    test:
    |-
      ows layer delete nonexistent-layer
    verify:
    |-
      true

  - name: "Layer load non-existent layer fails"
    prepare:
    |-
      ows workspace add layer-noexist
    test:
    |-
      ! ows layer load layer-noexist no-such-layer
    verify:
    |-
      true

  - name: "Layer shortcut alias works"
    prepare:
    |-
      ows workspace add layer-alias-ws
      echo "alias-test" > ~/.ows/workspaces/layer-alias-ws/alias.txt
    test:
    |-
      ows l save layer-alias-ws alias-layer
    verify:
    |-
      ows l list | grep -q alias-layer

  - name: "Layer save preserves nested directory structure"
    prepare:
    |-
      ows workspace add layer-nested
      mkdir -p ~/.ows/workspaces/layer-nested/a/b/c
      echo "deep" > ~/.ows/workspaces/layer-nested/a/b/c/deep.txt
      echo "mid" > ~/.ows/workspaces/layer-nested/a/b/mid.txt
      echo "top" > ~/.ows/workspaces/layer-nested/a/top.txt
    test:
    |-
      ows layer save layer-nested nested-layer
      rm -rf ~/.ows/workspaces/layer-nested/a
      ows layer load layer-nested nested-layer
    verify:
    |-
      content=$(cat ~/.ows/workspaces/layer-nested/a/b/c/deep.txt)
      if [ "$content" != "deep" ]; then
        echo "FAIL: expected deep.txt content=deep, got: $content" >&2
        exit 1
      fi
      content=$(cat ~/.ows/workspaces/layer-nested/a/b/mid.txt)
      if [ "$content" != "mid" ]; then
        echo "FAIL: expected mid.txt content=mid, got: $content" >&2
        exit 1
      fi
      content=$(cat ~/.ows/workspaces/layer-nested/a/top.txt)
      if [ "$content" != "top" ]; then
        echo "FAIL: expected top.txt content=top, got: $content" >&2
        exit 1
      fi

  - name: "Layer save with files containing spaces in names"
    prepare:
    |-
      ows workspace add layer-spaces
      echo "spaced" > ~/.ows/workspaces/layer-spaces/"file with spaces.txt"
      mkdir -p ~/.ows/workspaces/layer-spaces/"dir with spaces"
      echo "also spaced" > ~/.ows/workspaces/layer-spaces/"dir with spaces/inner file.txt"
    test:
    |-
      ows layer save layer-spaces spaces-layer
      rm -rf ~/.ows/workspaces/layer-spaces/"file with spaces.txt" ~/.ows/workspaces/layer-spaces/"dir with spaces"
      ows layer load layer-spaces spaces-layer
    verify:
    |-
      content=$(cat ~/.ows/workspaces/layer-spaces/"file with spaces.txt")
      if [ "$content" != "spaced" ]; then
        echo "FAIL: expected spaced file content=spaced, got: $content" >&2
        exit 1
      fi
      content=$(cat ~/.ows/workspaces/layer-spaces/"dir with spaces/inner file.txt")
      if [ "$content" != "also spaced" ]; then
        echo "FAIL: expected inner spaced file content=also spaced, got: $content" >&2
        exit 1
      fi

  - name: "Workspace layer subcommand works"
    prepare:
    |-
